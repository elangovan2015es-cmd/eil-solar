function viEnableMic(){
  var mic=document.getElementById("vi-mic");
  if(mic){ mic.className="vi-mic-btn idle"; mic.textContent="🎤"; }
  viSetStatus("Tap mic and speak your answer");
}

function viDisableMic(){
  var mic=document.getElementById("vi-mic");
  if(mic){ mic.className="vi-mic-btn wait"; mic.textContent="⏳"; }
}

function viMicTap(){
  if(VI_BUSY) return;
  var mic=document.getElementById("vi-mic");
  if(!mic) return;
  if(mic.className.indexOf("rec")>-1){
    viStopRec();
  } else if(mic.className.indexOf("idle")>-1){
    viStartRec();
  }
}

function viStartRec(){
  if(!("webkitSpeechRecognition" in window||"SpeechRecognition" in window)){
    viAddMsg("sys","Voice needs Chrome on desktop/Android, or Safari on iPhone.");
    return;
  }
  if(VI_REC){ try{VI_REC.stop();}catch(e){} VI_REC=null; }
  if(VI_SYNTH) VI_SYNTH.cancel();

  var mic=document.getElementById("vi-mic");
  var heard=document.getElementById("vi-heard");
  var av=document.getElementById("vi-av");
  if(mic){ mic.className="vi-mic-btn rec"; mic.textContent="⏹"; }
  if(heard){ heard.value=""; heard.placeholder="Listening — speak now..."; }
  if(av) av.className="vi-av li";
  viSetStatus("🔴 Listening...");

  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var rec=new SR();
  rec.lang="en-IN";
  rec.continuous=false;      // single utterance — much more reliable
  rec.interimResults=true;
  rec.maxAlternatives=3;
  VI_REC=rec;

  var finalTxt="";
  rec.onresult=function(e){
    var interim="";
    for(var i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) finalTxt=e.results[i][0].transcript;
      else interim=e.results[i][0].transcript;
    }
    var heard2=document.getElementById("vi-heard");
    if(heard2) heard2.value=finalTxt||interim;
  };

  rec.onspeechend=function(){ rec.stop(); };

  rec.onend=function(){
    VI_REC=null;

// ── HANDLE ANSWER — Claude AI processes each short answer ─────────────────────
async function viHandleAnswer(raw){
  VI_BUSY=true;
  var q=VI_QS[VI_STEP];
  viDisableMic();

  // Show user bubble
  viAddMsg("usr", raw);
  viTyping();

  // Ask Claude to extract the specific field value from this short answer
  var prompt="The user was asked: \""+q.ask+"\"\n"
    +"They responded: \""+raw+"\"\n\n"
    +"Extract the value for the field '"+q.key+"'.\n\n"
    +"Rules per field:\n"
    +"- name: return the person's name as spoken, title-cased\n"
    +"- phone: return exactly 10 digits only (no spaces/symbols). If less than 10 digits heard, return null.\n"
    +"- location: return the city/area name\n"
    +"- category: return exactly one of: Residential, Commercial, Industrial, HT\n"
    +"  home/house/domestic=Residential; shop/office/commercial/store=Commercial;\n"
    +"  factory/industry/industrial/plant=Industrial; ht/high tension/large=HT\n"
    +"- bill: return the number only (convert spoken like 'eight thousand'=8000)\n"
    +"- units: return the number only (convert 'three hundred'=300)\n"
    +"- demand: return the number only, OR 'skip' if user says skip/don't know/no idea\n"
    +"- model: return 'epc' or 'dev'\n"
    +"  own/buy/invest/purchase/epc/day one=epc;\n"
    +"  zero/free/developer/monthly/no upfront/no payment=dev\n"
    +"- battery: return 'yes' or 'no'\n\n"
    +"If the answer is unclear or doesn't match the field, return null.\n"
    +"Respond with JSON only: {\""+q.key+"\": value_or_null}";

  var extracted=null;
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:60,
        messages:[{role:"user",content:prompt}]})
    });
    var data=await res.json();
    var txb=(data.content||[]).find(function(b){return b.type==="text";});
    if(txb){
      var parsed=JSON.parse(txb.text.replace(/```json|```/g,"").trim());
      extracted=parsed[q.key];
    }
  }catch(e){
    // Fallback: basic extraction
    extracted=viFallback(q.key, raw);
  }

  viRemoveTyping();

  if(extracted!==null && extracted!==undefined && String(extracted).trim()!==""){
    // ── Good answer — confirm and move on ──
    VI_DATA[q.key]=extracted;
    var confirmText=q.confirm(extracted);
    viTyping();
    setTimeout(function(){
      viRemoveTyping();
      viAddMsg("bot","<span class='ans-badge'>✓ "+confirmText+"</span>");
      viSpeak(confirmText+". ", function(){
        viAskStep(VI_STEP+1);
      });
    },400);
  } else {
    // ── Didn't understand — ask again simply ──
    VI_BUSY=false;
    viTyping();
    setTimeout(function(){
      viRemoveTyping();
      var retry="Sorry, I didn't quite catch that. "+q.ask;
      viAddMsg("bot","<span class='ans-badge bad'>Sorry, could you say that again?</span><br/>"
        +"<span style='color:#8696a0;font-size:12px;'>"+q.hint+"</span>");
      viSpeak("Sorry, I didn't catch that. "+q.ask, function(){
        viEnableMic();
      });
    },400);
  }
}

// ── FALLBACK PARSER ───────────────────────────────────────────────────────────
function viFallback(key, raw){
  var t=raw.toLowerCase().trim();
  if(key==="phone"){
    var d=raw.replace(/\D/g,""); return d.length>=10?d.slice(-10):null;
  }
  if(key==="bill"||key==="units"||key==="demand"){
    if(t==="skip"||t.indexOf("don't know")>-1||t.indexOf("no idea")>-1) return key==="demand"?"skip":null;
    var n=parseInt(raw.replace(/[^0-9]/g,"")); if(!isNaN(n)&&n>0) return String(n);
    var NUMS={"zero":0,"one":1,"two":2,"three":3,"four":4,"five":5,"six":6,"seven":7,"eight":8,"nine":9,
      "ten":10,"eleven":11,"twelve":12,"thirteen":13,"fourteen":14,"fifteen":15,"sixteen":16,
      "seventeen":17,"eighteen":18,"nineteen":19,"twenty":20,"thirty":30,"forty":40,"fifty":50,
      "sixty":60,"seventy":70,"eighty":80,"ninety":90,"hundred":100,"thousand":1000,"lakh":100000};
    var words=t.replace(/\band\b/g," ").split(/[\s,]+/),tot=0,cur=0;
    words.forEach(function(w){var nv=NUMS[w];if(nv!==undefined){
      if(nv===100)cur=(cur||1)*100; else if(nv>=1000){tot+=(cur||1)*nv;cur=0;} else cur+=nv;}});
    var r=tot+cur; return r>0?String(r):null;
  }
  if(key==="category"){
    if(t.indexOf("home")>-1||t.indexOf("house")>-1||t.indexOf("residential")>-1||t.indexOf("domestic")>-1) return "Residential";
    if(t.indexOf("shop")>-1||t.indexOf("office")>-1||t.indexOf("commercial")>-1||t.indexOf("store")>-1) return "Commercial";
    if(t.indexOf("factory")>-1||t.indexOf("industri")>-1||t.indexOf("plant")>-1||t.indexOf("mill")>-1) return "Industrial";
    if(t.indexOf("ht")>-1||t.indexOf("high tension")>-1||t.indexOf("large")>-1) return "HT";
    return null;
  }
  if(key==="model"){
    if(t.indexOf("own")>-1||t.indexOf("epc")>-1||t.indexOf("buy")>-1||t.indexOf("invest")>-1||t.indexOf("day one")>-1||t.indexOf("purchase")>-1) return "epc";
    if(t.indexOf("zero")>-1||t.indexOf("free")>-1||t.indexOf("developer")>-1||t.indexOf("monthly")>-1||t.indexOf("no upfront")>-1) return "dev";
    return null;
  }
  if(key==="battery"){
    if(t.indexOf("yes")>-1||t.indexOf("need")>-1||t.indexOf("want")>-1||t.indexOf("backup")>-1||t.indexOf("cut")>-1) return "yes";
    if(t.indexOf("no")>-1||t.indexOf("not")>-1||t.indexOf("don't")>-1||t.indexOf("without")>-1) return "no";
    return null;
  }
  if(key==="name"||key==="location"){
    return raw.trim().replace(/\b\w/g,function(c){return c.toUpperCase();});
  }
  return raw.trim()||null;
}

<script>
// ── PREVENT MULTIPLE TABS ON iPHONE ──────────────────────────────────────────
// When installed as PWA, target="_blank" links open new Safari tabs.
// This catches all link clicks and opens in same window instead.
document.addEventListener("click", function(e){
  var a = e.target.closest("a[href]");
  if(a && a.href && !a.href.startsWith("tel:") && !a.href.startsWith("mailto:")){
    // External links (WhatsApp, etc) are intentional — allow
    if(a.href.indexOf("wa.me")>-1||a.href.indexOf("mailto:")>-1||a.href.indexOf("tel:")>-1) return;
    // Internal navigation — prevent new tab
    if(a.target==="_blank"){ a.removeAttribute("target"); }
  }
});
// For PWA: if opened in standalone mode, ensure no address bar / tab switch
if(window.navigator.standalone){
  document.addEventListener("click", function(e){
    var a=e.target.closest("a");
    if(a&&a.href&&!a.href.startsWith("tel:")&&!a.href.startsWith("mailto:")){
      if(a.href.indexOf(window.location.hostname)>-1||a.href.startsWith("/")){
        e.preventDefault();
        window.location.href=a.href;
      }
    }
  });
}
</script>
